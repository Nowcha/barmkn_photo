<script>
    const container = document.getElementById('image-container');

    fetch('manifest.json')
        .then(res => res.json())
        .then(files => {
            files.forEach(fileName => {
                const img = document.createElement('img');
                img.src = fileName;
                img.alt = fileName;
                img.width = 300;
                container.appendChild(img);
            });
        });
</script>
