<script>
    fetch('manifest.json')
        .then(res => res.json())
        .then(files => {
            const container = document.getElementById('image-container'); // ← 中に移動
            
            if (!container) {
                console.error('image-containerが見つかりません');
                return;
            }

            files.forEach(fileName => {
                const img = document.createElement('img');
                img.src = fileName;
                img.alt = fileName;
                img.width = 300;
                container.appendChild(img);
            });
        })
        .catch(err => console.error('manifest.json の取得失敗:', err));
</script>
